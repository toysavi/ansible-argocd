# roles/nfs/tasks/main.yml
- name: Deploy NFS provisioner
  shell: |
    kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/nfs-subdir-external-provisioner/master/deploy/deployment.yaml

- name: Create StorageClass
  copy:
    dest: /tmp/storageclass.yaml
    content: |
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: nfs-client
      provisioner: cluster.local/nfs-subdir-external-provisioner
      parameters:
        archiveOnDelete: "false"

- name: Apply StorageClass
  shell: kubectl apply -f /tmp/storageclass.yaml